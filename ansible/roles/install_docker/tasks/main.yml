#  file:
#    owner: "{{ansible_user}}"
#    path: "{{home_folder}}/.config/traefik/letsencrypt/acme.json"
#    state: touch
#    mode: '0600'

- name: Install Traefik
  become: yes
  become_user: "{{ansible_user}}"
  community.docker.docker_container:
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/etc/traefik.yml:/etc/traefik/traefik.yml"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/log:/logs:rw"
      - "~/.config/traefik/letsencrypt:/letsencrypt"
    image: docker.io/traefik:v3.6
    name: traefik

- name: Install dockpeek
  become: yes
  become_user: "{{ansible_user}}"
  community.docker.docker_container:
    name: dockpeek
    image: docker.io/dockpeek/dockpeek:latest
    state: started
    restart_policy: unless-stopped
    env:
      SECRET_KEY: "{{DOCKPEEK_SECRET}}"
      USERNAME: "{{DOCKPEEK_ADMIN_MAIL}}"
      PASSWORD: "{{DOCKPEEK_ADMIN_PASS}}"
    ports:
      - "3420:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels: 
    # Of course I want to have that container auto-updated
      guerite.update: "*/10 * * * * "
      traefik.enable: "true" 
      traefik.http.routers.dockpeek.entrypoints: "websecure"
      traefik.http.routers.dockpeek.tls: "true"
      traefik.http.routers.dockpeek.tls.certresolver: "letsencrypt" 
      traefik.http.routers.dockpeek.rule: "Host(`nicolas-delsaux.hd.free.fr`) && PathPrefix(`/dockpeek/`)"
      traefik.http.routers.dockpeek.middlewares: "dockpeek@docker"
      traefik.http.middlewares.dockpeek-prefix.stripprefix.prefixes: "/dockpeek"
      traefik.http.middlewares.dockpeek-rewrite-response.plugin.rewritebody.rewrites[0].regex: "\"/"
      traefik.http.middlewares.dockpeek-rewrite-response.plugin.rewritebody.rewrites[0].replacement: "\"/dockpeek/"
      traefik.http.middlewares.dockpeek-rewrite-request.plugin.fullUrlRewrite.regex: "(.*)\/dockpeek\/dockpeek\/(.*)"
      traefik.http.middlewares.dockpeek-rewrite-request.plugin.fullUrlRewrite.replacement: "$1/dockpeek/$2"
      traefik.http.middlewares.dockpeek.chain.middlewares: "dockpeek-prefix,dockpeek-rewrite-response,dockpeek-rewrite-request"

- name: Make sure we have the .local/bin folder
  ansible.builtin.file:
    path: "{{local_bin_folder}}"
    state: directory
  become: true
  become_user: "{{ansible_user}}"

- name: Install ctop
  copy:
    content: |
      #!/bin/sh
      docker run --rm -ti --name=ctop --volume /var/run/docker.sock:/var/run/docker.sock:ro  quay.io/vektorlab/ctop:latest
    mode: '0750'
    dest: "{{local_bin_folder}}/ctop"
  become: true
  become_user: "{{ansible_user}}"

- name: Install Ponysay
  copy:
    content: |
      #!/bin/sh
      docker run -ti --rm mpepping/ponysay $@
    mode: '0750'
    dest: "{{local_bin_folder}}/ponysay"
  become: true
  become_user: "{{ansible_user}}"
