---
- name: Add Docker debian repository
  deb822_repository:
    name: Docker
    state: present
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ansible_distribution_release}}"
    signed_by:  https://download.docker.com/linux/ubuntu/gpg
    components:
      - stable

- name: Install Docker packages
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin

- name: Ensure group "docker" exists with correct gid
  ansible.builtin.group:
    name: docker
    state: present

- name: "Adding users"  
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop:
    - "{{ansible_user}}"
    - docker

- name: Install Guerite
  become: yes
  become_user: "{{ansible_user}}"
  community.docker.docker_container:
    name: guerite
    image: ghcr.io/rcarmo/guerite
    state: started
    restart_policy: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      traefik.enable: "false"
    env:
      GUERITE_LOG_LEVEL: INFO
      GUERITE_PRUNE_CRON: docker image prune -f

- name: Create Traefik configuration file
  become: yes
  copy:
    dest: /etc/traefik.yml
    content: |
      # traefik.yml
      api:
        insecure: true
      # traefik.yaml - Configuration statique
      certificatesResolvers:
        letsencrypt:
          acme:
            email: "admin@nicolas-delsaux.hd.free.fr"  # Email pour les notifications
            storage: /etc/traefik/acme.json   # Où stocker les certificats
            caServer: "https://acme-v02.api.letsencrypt.org/directory"
            httpChallenge:
              entryPoint: web                 # Entrypoint pour le challenge HTTP
      entryPoints:
        web:
          address: ":80"
          http:
            redirections:
              entryPoint:
                to: websecure
                scheme: https
                permanent: true
        websecure:
          address: ":443"
          http:
            tls: true
      providers:
        docker: {}
      experimental:
        plugins:
          redirectLocation:
            modulename: "github.com/SchmitzDan/traefik-plugin-redirect-location"
            version: "v0.0.1" #replace with newest version
          rewriteHeaders:
            modulename: "github.com/XciD/traefik-plugin-rewrite-headers"
            version: "v0.0.4"
          rewritebody:
              moduleName: "github.com/traefik/plugin-rewritebody"
              version: "v0.3.1"
          fullUrlRewrite:
            moduleName: "github.com/e-flux-platform/full-url-rewrite-traefik-plugin"
            version: "v0.0.6"

- name: Create Let's encrypt configuration folder tree
  become: yes
  become_user: "{{ansible_user}}"
  file:
    owner: "{{ansible_user}}"
    path: "{{home_folder}}/.config/traefik/letsencrypt"
    state: directory

#- name: Create Let's encrypt configuration file
