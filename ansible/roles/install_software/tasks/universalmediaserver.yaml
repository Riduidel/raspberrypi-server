---
- name: Install universalmediaserver
  become: yes
  become_user: "{{ansible_user}}"
  community.docker.docker_container:
    name: universalmediaserver
    image: universalmediaserver/ums
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "bridge_to_the_internet"
    labels: 
    # Of course I want to have that container auto-updated
      guerite.update: "{{guerite_crontab}}"
      traefik.enable: "true"
      traefik.http.routers.ums.entrypoints: "websecure"
      traefik.http.routers.ums.tls: "true"
      traefik.http.routers.ums.tls.certresolver: "letsencrypt" 
      traefik.http.routers.ums.rule: "Host(`nicolas-delsaux.hd.free.fr`) && PathPrefix(`/ums`)"
      traefik.http.routers.ums.middlewares: "ums@docker"
      traefik.http.middlewares.ums-prefix.stripprefix.prefixes: "/ums"
      traefik.http.middlewares.ums-rewrite-body.plugin.rewritebody.rewrites[0].regex: "\"/"
      traefik.http.middlewares.ums-rewrite-body.plugin.rewritebody.rewrites[0].replacement: "\"/ums/"
      traefik.http.middlewares.ums-rewrite-location.plugin.redirectLocation.default: "true"
      traefik.http.middlewares.ums.chain.middlewares: ""
