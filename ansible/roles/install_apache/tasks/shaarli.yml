- name: Install Shaarli base image
  become: yes
  become_user: "{{ansible_user}}"
  community.docker.docker_container:
    name: Shaarli
    image: shaarli/shaarli:latest
    state: started
    restart_policy: unless-stopped
    labels: 
    # Of course I want to have that container auto-updated
      guerite.update: "*/10 * * * * "
      traefik.http.routers.Shaarli.rule: "PathPrefix(`/Shaarli/`)"
      traefik.http.routers.Shaarli.middlewares: "Shaarli@docker"
      traefik.http.middlewares.Shaarli-prefix.stripprefix.prefixes: "/Shaarli"
      traefik.http.middlewares.Shaarli-rewrite.plugin.rewritebody.rewrites[0].regex: "/tpl/"
      traefik.http.middlewares.Shaarli-rewrite.plugin.rewritebody.rewrites[0].replacement: "/Shaarli/tpl/"
      traefik.http.middlewares.Shaarli.chain.middlewares: "Shaarli-prefix,Shaarli-rewrite"
    volumes:
      - /var/www/html/Shaarli/data:/var/www/shaarli/data 
      - /var/www/html/Shaarli/plugins/:/var/www/shaarli/plugins/