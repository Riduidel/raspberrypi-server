---
- name: Install required packages
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - composer
    - yarn
    - git

- name: Check if we should download rss-bridge
  stat: 
    path: /var/www/html/rss-bridge
  register: rss_bridge_exists

- name: download rss-bridge
  git:
    repo: https://github.com/Riduidel/rss-bridge.git
    dest: /var/www/html/rss-bridge
    version: live
  become: yes
  become_user: "{{ansible_user}}"
  when: rss_bridge_exists.stat.exists == False

- name: Check if config is present
  stat: 
    path: /var/www/html/rss-bridge/whitelist.txt
  become: yes
  become_user: "{{ansible_user}}"
  register: config_exists

#- name: Copy data from QNAP
#  command: sshpass -p "{{qnap_password}}" rsync -r "{{ qnap_admin_user }}"@"{{ qnap_server_address }}":/share/Download/raspberry-server/to_backup/rss-bridge/* /var/www/html/rss-bridge
#  args:
#    chdir: /var/www/html/rss-bridge
#  become: yes
#  become_user: "{{ansible_user}}"
#  when: config_exists.stat.exists == False

- name: Make rss-bridge usable by www-data
  file:
    path: /var/www/html/rss-bridge
    group: www-data
    owner: www-data
    mode: 0777
    recurse: yes

- name: Prepare config backup
  file:
    path: "{{home_folder}}/to_backup/rss-bridge"
    owner: nicolas-delsaux
    group: nicolas-delsaux
    recurse: true
    state: directory

- name: Immediatly mark config for backup
  file:
    src: /var/www/html/rss-bridge/whitelist.txt
    dest: "{{home_folder}}/to_backup/rss-bridge/whitelist.txt"
    owner: nicolas-delsaux
    group: nicolas-delsaux
    state: link

- name: Install rss-bridge base image
  become: yes
  become_user: "{{ansible_user}}"
  community.docker.docker_container:
    name: rss-bridge
    image: rssbridge/rss-bridge:latest
    state: started
    restart_policy: unless-stopped
    labels: 
    # Of course I want to have that container auto-updated
      guerite.update: "*/10 * * * * "
      traefik.http.routers.rss-bridge.rule: "PathPrefix(`/rss-bridge/`)"
      traefik.http.routers.rss-bridge.middlewares: "rss-bridge@docker"
      traefik.http.middlewares.rss-bridge-prefix.stripprefix.prefixes: "/rss-bridge"
      traefik.http.middlewares.rss-bridge-rewrite.plugin.rewrite.rewrites[0].regex: "\"/"
      traefik.http.middlewares.rss-bridge-rewrite.plugin.rewrite.rewrites[0].replacement: "\"/rss-bridge/"
      traefik.http.middlewares.rss-bridge.chain.middlewares: "rss-bridge-prefix,rss-bridge-rewrite"
    volumes:
      - /var/www/html/rss-bridge/config:/config
      - /var/www/html/rss-bridge/whitelist.txt:/whitelist.txt
